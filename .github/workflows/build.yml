name: Build IPA

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      # checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # install xcodegen
      - name: Install XcodeGen
        run: brew install xcodegen

      # generate Xcode project
      - name: Generate Xcode Project
        run: xcodegen generate

      # build archive without signing
      - name: Build archive without signing
        run: |
          xcodebuild \
            -scheme App \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath ${{ github.workspace }}/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      # export unsigned IPA
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ github.workspace }}/build/App.xcarchive \
            -exportPath ${{ github.workspace }}/build/App \
            -exportOptionsPlist ./ExportOptions.plist

      # upload IPA as artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: FindMyFriends.ipa
          path: ${{ github.workspace }}/build/App/*.ipa