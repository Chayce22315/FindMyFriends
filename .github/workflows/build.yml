name: Build iOS IPA

on:
  push:
    branches: [ main ]   # triggers automatically on every push
  workflow_dispatch:     # still allows manual trigger

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and Archive IPA (Unsigned)
        run: |
          # Build archive without signing
          xcodebuild \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

          # Export IPA without signing
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath $PWD/build

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FindMyFriends-IPA
          path: build/*.ipa