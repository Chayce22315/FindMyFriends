name: Build IPA

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      # checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # install xcodegen
      - name: Install XcodeGen
        run: brew install xcodegen

      # generate Xcode project
      - name: Generate Xcode Project
        run: xcodegen generate

      # build archive without signing
      - name: Build archive without signing
        run: |
          xcodebuild \
            -scheme App \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath ${{ github.workspace }}/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      # Package unsigned IPA without exportArchive (no Apple team / signing required)
      - name: Package IPA from archive
        run: |
          set -euo pipefail
          ARCHIVE="${{ github.workspace }}/build/App.xcarchive"
          APP="${ARCHIVE}/Products/Applications/App.app"
          OUT="${{ github.workspace }}/build"
          if [ ! -d "$APP" ]; then
            echo "Expected app bundle not found at: $APP"
            find "$ARCHIVE" -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi
          STAGING="$OUT/ipa-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING/Payload"
          cp -R "$APP" "$STAGING/Payload/"
          (cd "$STAGING" && zip -r "$OUT/FindMyFriends.ipa" Payload)
          rm -rf "$STAGING"
          ls -la "$OUT/FindMyFriends.ipa"

      # upload IPA as artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FindMyFriends.ipa
          path: ${{ github.workspace }}/build/FindMyFriends.ipa