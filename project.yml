name: FindMyFriends

options:
  bundleIdPrefix: com.pixelatedstudios
  deploymentTarget:
    iOS: "17.0"

targets:
  App:
    type: application
    platform: iOS

    entitlements:
      path: App.entitlements

    dependencies:
      - sdk: HealthKit.framework
      - sdk: Contacts.framework
      - sdk: MapKit.framework
      - sdk: CoreLocation.framework
      - sdk: MusicKit.framework
      - sdk: MediaPlayer.framework
      - sdk: ActivityKit.framework
      - target: FindMyFriendsWidget

    sources:
      - path: lib/App
      - path: lib/Shared
      - path: Assets.xcassets

    settings:
      base:
        PRODUCT_NAME: FindMyFriends
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelatedstudios.findmyfriends
        SWIFT_VERSION: 5.0
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  FindMyFriendsWidget:
    type: app-extension
    platform: iOS

    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework

    sources:
      - path: lib/Widget
      - path: lib/Shared

    settings:
      base:
        PRODUCT_NAME: FindMyFriendsWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelatedstudios.findmyfriends.widget
        SWIFT_VERSION: 5.0
        INFOPLIST_FILE: lib/Widget/Info.plist

    scheme:
      build:
        targets:
          App: all
